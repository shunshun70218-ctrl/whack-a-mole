<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>秀朗 415 的大亂鬥！· 打地鼠</title>
<style>
  :root {
    --grass-dark: #4a8a3a;
    --grass: #6cae4f;
    --grass-light: #88c265;
    --soil-dark: #5b3a22;
    --soil: #7a4f2e;
    --soil-light: #a06f44;
    --accent: #ff9c1c;
    --hit-yellow: #ffd400;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
    background: linear-gradient(180deg, #88d8ff 0%, #c7eaff 35%, #b9e08c 60%, #6cae4f 100%);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem 1rem 2rem;
    color: #2a2a2a;
    user-select: none;
  }
  /* hide system cursor on devices with a mouse */
  @media (hover: hover) and (pointer: fine) {
    body, body * { cursor: none !important; }
  }
  h1 {
    margin: 0.3rem 0 0.1rem;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
  }
  .subtitle { color: #2a4a1a; font-size: 0.85rem; margin-bottom: 0.8rem; opacity: 0.85; }

  .hud {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hud .chip {
    background: white;
    padding: 0.5rem 0.9rem;
    border-radius: 999px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    font-weight: 700;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .chip .label { color: #6e7681; font-weight: 600; font-size: 0.8rem; }
  .chip .val { color: #d04317; font-size: 1.15rem; font-variant-numeric: tabular-nums; }
  .chip.time .val { color: #2da44e; }
  .chip.best .val { color: #8957e5; }

  .board {
    width: min(480px, 94vw);
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(8px, 2vw, 14px);
    padding: clamp(10px, 2vw, 16px);
    background:
      radial-gradient(ellipse at 50% 60%, var(--grass-light) 0%, var(--grass) 60%, var(--grass-dark) 100%);
    border-radius: 18px;
    box-shadow: 0 14px 36px rgba(0,0,0,0.2), inset 0 0 0 3px #3e7330;
    touch-action: manipulation;
    position: relative;
  }

  .hole {
    position: relative;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 50% 35%, #1c0d05 0%, #2c170a 40%, var(--soil-dark) 80%, var(--soil) 100%);
    box-shadow:
      inset 0 8px 14px rgba(0,0,0,0.55),
      inset 0 -3px 6px rgba(255,255,255,0.06),
      0 4px 8px rgba(0,0,0,0.15);
    overflow: hidden;
    transition: transform .12s ease;
  }
  .hole:active { transform: scale(0.97); }
  .hole::before {
    content: '';
    position: absolute;
    inset: -6%;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, transparent 64%, var(--soil-light) 67%, var(--soil) 75%, transparent 80%);
    pointer-events: none;
    z-index: 2;
  }

  /* mole-wrap holds the chibi character; controls pop up/down */
  .mole-wrap {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 108%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    transform: translateY(108%);
    transition: transform .22s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    z-index: 1;
  }
  /* up 狀態往下推 10%,讓頭往洞的中央靠一點點(身體會被圓形邊界自然切掉) */
  .hole.up .mole-wrap { transform: translateY(10%); pointer-events: auto; }
  .hole.down .mole-wrap { transform: translateY(108%); transition-duration: .15s; }

  /* The chibi character (SVG) — apply hit transforms here */
  .chibi {
    height: 100%;
    width: auto;
    display: block;
    filter: drop-shadow(0 6px 6px rgba(0,0,0,0.35));
    transform-origin: 50% 92%;
    transition: transform .18s, filter .18s;
    pointer-events: none;
  }

  /* HIT effect */
  .hole.hit .chibi {
    animation: hit-shake .42s cubic-bezier(.36,.07,.19,.97);
    transform: scale(0.86) rotate(-14deg) skewX(-6deg);
    filter: saturate(1.45) hue-rotate(-10deg) brightness(1.08) drop-shadow(0 4px 4px rgba(0,0,0,0.35));
  }
  @keyframes hit-shake {
    0%, 100% { transform: scale(0.86) rotate(-14deg) skewX(-6deg) translateX(0); }
    20%      { transform: scale(0.82) rotate(-18deg) skewX(-8deg) translateX(-6px); }
    40%      { transform: scale(0.88) rotate(-10deg) skewX(-4deg) translateX(6px); }
    60%      { transform: scale(0.82) rotate(-16deg) skewX(-7deg) translateX(-4px); }
    80%      { transform: scale(0.88) rotate(-12deg) skewX(-5deg) translateX(3px); }
  }

  /* 暈眩星星 */
  .stars {
    position: absolute;
    top: 0%;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 32%;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
  }
  .hole.hit .stars { opacity: 1; animation: stars-spin 0.45s linear; }
  @keyframes stars-spin {
    0%   { opacity: 0; transform: translateX(-50%) rotate(0deg) scale(0.4); }
    30%  { opacity: 1; transform: translateX(-50%) rotate(140deg) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) rotate(360deg) scale(1.1); }
  }

  /* K.O.! */
  .ko {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translate(-50%, 0);
    font-weight: 900;
    font-size: clamp(1rem, 3.6vw, 1.6rem);
    color: var(--hit-yellow);
    -webkit-text-stroke: 2px #b8001a;
    text-shadow: 0 3px 0 rgba(0,0,0,0.25);
    letter-spacing: 1px;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
    font-family: "Arial Black", sans-serif;
  }
  .hole.hit .ko { animation: ko-pop 0.55s ease-out; }
  @keyframes ko-pop {
    0%   { opacity: 0; transform: translate(-50%, 20%) scale(0.4) rotate(-15deg); }
    30%  { opacity: 1; transform: translate(-50%, -10%) scale(1.2) rotate(-8deg); }
    60%  { opacity: 1; transform: translate(-50%, -40%) scale(1) rotate(-4deg); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9) rotate(0deg); }
  }

  /* +score */
  .gain {
    position: absolute;
    bottom: 16%;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 800;
    font-size: clamp(0.9rem, 3vw, 1.2rem);
    color: #ffe600;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6), -1px -1px 0 #b8001a, 1px 1px 0 #b8001a;
    opacity: 0;
    pointer-events: none;
    z-index: 4;
  }
  .hole.hit .gain { animation: gain-rise 0.6s ease-out; }
  @keyframes gain-rise {
    0%   { opacity: 0; transform: translate(-50%, 20%) scale(0.6); }
    30%  { opacity: 1; transform: translate(-50%, -40%) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }

  /* Combo flash */
  .combo-flash {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: inset 0 0 0 4px gold;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }
  .hole.hit.combo .combo-flash { animation: combo-flash .4s ease-out; }
  @keyframes combo-flash {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ========== 錘子游標 ========== */
  .hammer {
    position: fixed;
    left: 0; top: 0;
    width: 60px; height: 60px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-12px, -8px) rotate(-25deg);
    filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.35));
    transition: transform .05s linear;
    will-change: transform;
  }
  .hammer.swing {
    animation: hammer-swing .22s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes hammer-swing {
    0%   { transform: translate(-12px, -8px) rotate(-25deg); }
    35%  { transform: translate(-2px, 16px)  rotate(70deg); }
    70%  { transform: translate(-8px, 8px)   rotate(35deg); }
    100% { transform: translate(-12px, -8px) rotate(-25deg); }
  }
  @media (hover: none) { .hammer { display: none; } }

  .controls {
    display: flex;
    gap: 0.7rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.65rem 1.4rem;
    border-radius: 999px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
    box-shadow: 0 4px 0 #c47215;
    transition: transform .1s, box-shadow .1s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c47215; }
  button.secondary {
    background: white;
    color: #2a4a1a;
    box-shadow: 0 4px 0 #b3c5a0;
  }
  button.secondary:active { box-shadow: 0 2px 0 #b3c5a0; }

  /* overlays */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 30, 40, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }
  .overlay.hidden { display: none; }
  .card {
    background: white;
    border-radius: 18px;
    padding: 1.8rem 2rem;
    max-width: 90vw;
    width: 360px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
  }
  .card h2 { margin: 0 0 0.6rem; font-size: 1.6rem; }
  .card .big {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
    margin: 0.4rem 0;
    line-height: 1;
  }
  .card .row { color: #57606a; margin: 0.4rem 0; font-size: 0.95rem; }
  .card button { margin-top: 1rem; }
  .new-best { color: #d62828; font-weight: 800; }

  footer { margin-top: 1rem; color: #2a4a1a; font-size: 0.8rem; text-align: center; opacity: 0.8; }

  /* ========== 可愛插圖背景裝飾 ========== */
  .decor {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .decor svg { position: absolute; }
  /* 主要內容要浮在裝飾上面 */
  body > h1, body > .subtitle, body > .hud, body > .board, body > .controls, body > footer {
    position: relative;
    z-index: 1;
  }

  .sun {
    top: 14px;
    right: 18px;
    width: clamp(60px, 9vw, 84px);
    height: clamp(60px, 9vw, 84px);
    animation: sun-spin 24s linear infinite;
    filter: drop-shadow(0 4px 10px rgba(255,180,30,0.45));
  }
  @keyframes sun-spin { to { transform: rotate(360deg); } }

  .cloud { opacity: 0.95; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.08)); }
  .cloud-1 {
    top: 80px; left: 4%;
    width: clamp(90px, 14vw, 140px);
    animation: cloud-drift-1 24s ease-in-out infinite;
  }
  .cloud-2 {
    top: 170px; right: 6%;
    width: clamp(70px, 11vw, 110px);
    animation: cloud-drift-2 30s ease-in-out infinite;
  }
  @keyframes cloud-drift-1 {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(30px); }
  }
  @keyframes cloud-drift-2 {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(-26px); }
  }

  .butterfly {
    width: 46px; height: 46px;
    top: 50%; left: 8%;
    animation: butterfly-fly 16s ease-in-out infinite;
    transform-origin: 50% 50%;
  }
  .butterfly .wing {
    transform-origin: 23px 23px;
    animation: butterfly-flap 0.32s ease-in-out infinite alternate;
  }
  .butterfly .wing.right { animation-delay: 0s; }
  .butterfly .wing.left  { transform: scaleX(-1); transform-origin: 23px 23px; }
  @keyframes butterfly-flap {
    from { transform: scaleX(1) rotateY(0deg); }
    to   { transform: scaleX(1) rotateY(60deg); }
  }
  @keyframes butterfly-fly {
    0%   { transform: translate(0, 0) rotate(-8deg); }
    25%  { transform: translate(40px, -30px) rotate(6deg); }
    50%  { transform: translate(120px, 10px) rotate(-4deg); }
    75%  { transform: translate(50px, 50px) rotate(8deg); }
    100% { transform: translate(0, 0) rotate(-8deg); }
  }

  @media (max-width: 480px) {
    .sun { width: 56px; height: 56px; top: 8px; right: 8px; }
    .cloud-1 { top: 60px; width: 80px; }
    .cloud-2 { top: 130px; width: 64px; }
    .butterfly { width: 36px; height: 36px; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.3rem; }
    .controls button { padding: 0.55rem 1rem; font-size: 0.9rem; }
    .card { padding: 1.4rem 1.4rem; }
    .card .big { font-size: 2.4rem; }
  }
</style>
</head>
<body>
  <!-- 可愛背景裝飾:太陽 + 雲朵 + 蝴蝶 -->
  <div class="decor" aria-hidden="true">
    <!-- 太陽(笑臉) -->
    <svg class="sun" viewBox="0 0 80 80">
      <g stroke="#ffb71c" stroke-width="4" stroke-linecap="round">
        <line x1="40" y1="4"  x2="40" y2="14"/>
        <line x1="40" y1="66" x2="40" y2="76"/>
        <line x1="4"  y1="40" x2="14" y2="40"/>
        <line x1="66" y1="40" x2="76" y2="40"/>
        <line x1="14" y1="14" x2="21" y2="21"/>
        <line x1="59" y1="59" x2="66" y2="66"/>
        <line x1="14" y1="66" x2="21" y2="59"/>
        <line x1="59" y1="21" x2="66" y2="14"/>
      </g>
      <circle cx="40" cy="40" r="20" fill="#ffd24a" stroke="#ffb71c" stroke-width="2"/>
      <circle cx="33" cy="38" r="2.2" fill="#7a4a00"/>
      <circle cx="47" cy="38" r="2.2" fill="#7a4a00"/>
      <path d="M 32 44 Q 40 50 48 44" stroke="#7a4a00" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="46" r="2" fill="#ff8da1" opacity="0.6"/>
      <circle cx="50" cy="46" r="2" fill="#ff8da1" opacity="0.6"/>
    </svg>

    <!-- 雲朵 1 -->
    <svg class="cloud cloud-1" viewBox="0 0 110 60">
      <ellipse cx="28" cy="36" rx="20" ry="14" fill="white"/>
      <ellipse cx="55" cy="26" rx="22" ry="16" fill="white"/>
      <ellipse cx="82" cy="34" rx="18" ry="13" fill="white"/>
      <ellipse cx="55" cy="42" rx="38" ry="11" fill="white"/>
    </svg>

    <!-- 雲朵 2 -->
    <svg class="cloud cloud-2" viewBox="0 0 100 50">
      <ellipse cx="25" cy="28" rx="18" ry="12" fill="white"/>
      <ellipse cx="52" cy="22" rx="20" ry="14" fill="white"/>
      <ellipse cx="76" cy="30" rx="16" ry="11" fill="white"/>
      <ellipse cx="50" cy="36" rx="32" ry="9" fill="white"/>
    </svg>

    <!-- 蝴蝶 -->
    <svg class="butterfly" viewBox="0 0 46 46">
      <!-- 身體 -->
      <ellipse cx="23" cy="23" rx="1.6" ry="9" fill="#3a2a1a"/>
      <circle cx="23" cy="14" r="2.2" fill="#3a2a1a"/>
      <!-- 觸角 -->
      <path d="M 22 13 Q 19 8 16 7" stroke="#3a2a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M 24 13 Q 27 8 30 7" stroke="#3a2a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="7" r="1" fill="#3a2a1a"/>
      <circle cx="30" cy="7" r="1" fill="#3a2a1a"/>
      <!-- 右翅膀 -->
      <g class="wing right">
        <path d="M 23 18 Q 38 8 42 18 Q 42 24 32 24 Q 27 24 23 22 Z"
              fill="#ff9ec7" stroke="#c54a8a" stroke-width="1.2"/>
        <path d="M 23 24 Q 36 26 40 34 Q 38 40 30 38 Q 25 36 23 30 Z"
              fill="#ffc7dc" stroke="#c54a8a" stroke-width="1.2"/>
        <circle cx="35" cy="16" r="1.6" fill="#fff"/>
        <circle cx="33" cy="32" r="1.4" fill="#fff"/>
      </g>
      <!-- 左翅膀(鏡像) -->
      <g class="wing left">
        <path d="M 23 18 Q 38 8 42 18 Q 42 24 32 24 Q 27 24 23 22 Z"
              fill="#ff9ec7" stroke="#c54a8a" stroke-width="1.2"/>
        <path d="M 23 24 Q 36 26 40 34 Q 38 40 30 38 Q 25 36 23 30 Z"
              fill="#ffc7dc" stroke="#c54a8a" stroke-width="1.2"/>
        <circle cx="35" cy="16" r="1.6" fill="#fff"/>
        <circle cx="33" cy="32" r="1.4" fill="#fff"/>
      </g>
    </svg>
  </div>

  <h1>🥊 秀朗 415 的大亂鬥！🔨</h1>
  <div class="subtitle">30 秒挑戰！看到同學就打，連擊有獎勵！</div>

  <div class="hud">
    <div class="chip"><span class="label">分數</span><span class="val" id="score">0</span></div>
    <div class="chip time"><span class="label">剩餘</span><span class="val" id="time">30</span><span style="font-size:0.8rem;color:#57606a;">秒</span></div>
    <div class="chip best"><span class="label">最高</span><span class="val" id="best">0</span></div>
    <div class="chip"><span class="label">連擊</span><span class="val" id="combo" style="color:#0969da;">0</span></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button id="start">▶️ 開始遊戲</button>
    <button id="sound" class="secondary">🔊 音效：開</button>
    <button id="music" class="secondary">🎵 音樂：開</button>
  </div>

  <div class="overlay" id="start-screen">
    <div class="card">
      <h2>🥊 秀朗 415 的大亂鬥！</h2>
      <div class="row">30 秒內盡量打中冒出的同學</div>
      <div class="row">連擊 3 次以上有 +1 額外分數</div>
      <div class="row" style="margin-top:0.6rem;color:#8957e5;">最高分：<span id="best-2">0</span></div>
      <button id="start-2">▶️ 開始遊戲</button>
    </div>
  </div>

  <div class="overlay hidden" id="end-screen">
    <div class="card">
      <h2 id="end-title">時間到！</h2>
      <div class="row">你的分數</div>
      <div class="big" id="final-score">0</div>
      <div class="row">最高分：<span id="end-best">0</span> <span id="new-best" class="new-best" style="display:none;">🎉 新紀錄！</span></div>
      <button id="restart">🔄 再玩一次</button>
    </div>
  </div>

  <!-- 共用 SVG：Q 版身體 + 真人頭像 -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <symbol id="chibi" viewBox="0 0 160 240">
        <!-- shadow under feet -->
        <ellipse cx="80" cy="232" rx="34" ry="5" fill="rgba(0,0,0,0.25)"/>

        <!-- 左腳 -->
        <g>
          <rect x="60" y="170" width="16" height="52" rx="7" fill="#5b6470" stroke="#2c3340" stroke-width="2"/>
          <ellipse cx="68" cy="226" rx="13" ry="6.5" fill="#f0c5d8" stroke="#a47092" stroke-width="2"/>
        </g>
        <!-- 右腳 -->
        <g>
          <rect x="84" y="170" width="16" height="52" rx="7" fill="#5b6470" stroke="#2c3340" stroke-width="2"/>
          <ellipse cx="92" cy="226" rx="13" ry="6.5" fill="#f0c5d8" stroke="#a47092" stroke-width="2"/>
        </g>

        <!-- 衣服：白色身體 + 紅色肩袖 -->
        <!-- 紅色肩 -->
        <ellipse cx="46" cy="124" rx="17" ry="15" fill="#d04317" stroke="#3a1a08" stroke-width="2"/>
        <ellipse cx="114" cy="124" rx="17" ry="15" fill="#d04317" stroke="#3a1a08" stroke-width="2"/>
        <!-- 白色身體 -->
        <path d="M 38 128 Q 32 152 38 178 Q 60 184 80 184 Q 100 184 122 178 Q 128 152 122 128 Q 102 138 80 138 Q 58 138 38 128 Z"
              fill="#ffffff" stroke="#3a1a08" stroke-width="2"/>
        <!-- 領口 (V neck hint) -->
        <path d="M 70 128 Q 80 140 90 128" fill="none" stroke="#d04317" stroke-width="2"/>

        <!-- 秀朗 415 國小制服標籤 -->
        <g font-family="-apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif" font-weight="900">
          <!-- 校徽:綠框白底「秀朗」 -->
          <rect x="46" y="148" width="22" height="11" rx="2.5" fill="#ffffff" stroke="#3a7f2a" stroke-width="1.4"/>
          <text x="57" y="157" font-size="8" fill="#3a7f2a" text-anchor="middle" letter-spacing="-0.5">秀朗</text>
          <!-- 班級號:紅底白字「415」 -->
          <rect x="46" y="160" width="22" height="10" rx="1.8" fill="#d04317" stroke="#7a2a08" stroke-width="0.8"/>
          <text x="57" y="168" font-size="8" fill="#ffffff" text-anchor="middle">415</text>
        </g>

        <!-- 左手（比 ya） -->
        <g>
          <path d="M 38 130 Q 22 116 18 92" stroke="#f5d5b5" stroke-width="11" stroke-linecap="round" fill="none"/>
          <path d="M 38 130 Q 22 116 18 92" stroke="#a07050" stroke-width="11.5" stroke-linecap="round" fill="none" opacity="0.25"/>
          <path d="M 38 130 Q 22 116 18 92" stroke="#f5d5b5" stroke-width="10" stroke-linecap="round" fill="none"/>
          <circle cx="18" cy="90" r="9" fill="#f5d5b5" stroke="#a07050" stroke-width="1.8"/>
          <!-- peace 兩根手指 -->
          <line x1="13" y1="86" x2="9"  y2="68" stroke="#f5d5b5" stroke-width="5" stroke-linecap="round"/>
          <line x1="13" y1="86" x2="9"  y2="68" stroke="#a07050" stroke-width="5.5" stroke-linecap="round" opacity="0.2"/>
          <line x1="22" y1="86" x2="26" y2="68" stroke="#f5d5b5" stroke-width="5" stroke-linecap="round"/>
          <line x1="22" y1="86" x2="26" y2="68" stroke="#a07050" stroke-width="5.5" stroke-linecap="round" opacity="0.2"/>
        </g>

        <!-- 右手（拿冰淇淋） -->
        <g>
          <path d="M 122 130 Q 138 132 145 148" stroke="#f5d5b5" stroke-width="10" stroke-linecap="round" fill="none"/>
          <circle cx="146" cy="150" r="8.5" fill="#f5d5b5" stroke="#a07050" stroke-width="1.8"/>
          <!-- 甜筒 -->
          <polygon points="138,146 154,146 146,178" fill="#d4a574" stroke="#7a4f2e" stroke-width="2"/>
          <!-- 甜筒紋路 -->
          <line x1="140" y1="153" x2="148" y2="151" stroke="#7a4f2e" stroke-width="1" opacity="0.6"/>
          <line x1="141" y1="161" x2="151" y2="159" stroke="#7a4f2e" stroke-width="1" opacity="0.6"/>
          <!-- 冰淇淋（霜淇淋造型） -->
          <path d="M 134 144 Q 132 132 138 124 Q 142 116 146 124 Q 150 116 154 124 Q 160 132 158 144 Q 146 150 134 144 Z"
                fill="#fff8dc" stroke="#c4a574" stroke-width="2"/>
          <!-- 螺旋紋 -->
          <path d="M 140 134 Q 146 130 152 134" fill="none" stroke="#e8d5a0" stroke-width="1.5"/>
        </g>

        <!-- 頭部光暈背景（避免邊緣突兀） -->
        <circle cx="80" cy="62" r="60" fill="#f5d5b5" stroke="#3a2a1a" stroke-width="2.5"/>
      </symbol>
      <!-- 真人頭像剪成圓的 clipPath（每個洞會各自參照） -->
      <clipPath id="headClipPath">
        <circle cx="80" cy="62" r="58"/>
      </clipPath>
    </defs>
  </svg>

  <!-- 錘子游標 -->
  <div class="hammer" id="hammer" aria-hidden="true">
    <svg viewBox="0 0 60 60" width="60" height="60">
      <g>
        <rect x="22" y="30" width="32" height="8" rx="3"
              fill="#8b5a2b" stroke="#3d2812" stroke-width="2"
              transform="rotate(40 38 34)"/>
        <rect x="22" y="31" width="32" height="2" rx="1"
              fill="#c08c5d" transform="rotate(40 38 32)"/>
        <rect x="14" y="6" width="22" height="18" rx="3"
              fill="#525252" stroke="#1a1a1a" stroke-width="2"
              transform="rotate(40 25 15)"/>
        <path d="M 8 16 L 14 10 L 18 14 L 12 20 Z"
              fill="#3a3a3a" stroke="#1a1a1a" stroke-width="2"
              transform="rotate(40 25 15)"/>
        <rect x="16" y="8" width="4" height="14" rx="1"
              fill="#8c8c8c" transform="rotate(40 25 15)"/>
      </g>
    </svg>
  </div>

  <footer>
    秀朗 415 班專屬版 · Made with Claude Code × GitHub Pages
  </footer>

<script>
(() => {
  const HOLES = 9;
  const ROUND_MS = 30000;
  const MIN_INTERVAL = 320, MAX_INTERVAL = 850;
  const MIN_LIFETIME = 600, MAX_LIFETIME = 1100;
  const MAX_CONCURRENT = 2;

  const $ = id => document.getElementById(id);
  const board = $('board');

  // 12 位秀朗 415 班同學,每輪會洗牌一次,12 個都出現過才開始下一輪
  const FACES = [
    'face-01.jpg', 'face-02.jpg', 'face-03.jpg', 'face-04.jpg',
    'face-05.jpg', 'face-06.jpg', 'face-07.jpg', 'face-08.jpg',
    'face-09.jpg', 'face-10.jpg', 'face-11.jpg', 'face-12.jpg'
  ];
  let faceBag = [];
  function nextFace() {
    if (faceBag.length === 0) {
      faceBag = FACES.slice();
      for (let i = faceBag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [faceBag[i], faceBag[j]] = [faceBag[j], faceBag[i]];
      }
    }
    return faceBag.shift();
  }

  // chibi SVG markup — uses <use href="#chibi">，臉部 image 與腮紅留在外面方便個別替換
  const chibiSvg = `
    <svg class="chibi" viewBox="0 0 160 240" xmlns="http://www.w3.org/2000/svg">
      <use href="#chibi"/>
      <image class="face-img" x="18" y="2" width="124" height="124"
             clip-path="url(#headClipPath)" preserveAspectRatio="xMidYMid slice"/>
      <ellipse cx="50" cy="80" rx="9" ry="5" fill="#ff8da1" opacity="0.45"/>
      <ellipse cx="110" cy="80" rx="9" ry="5" fill="#ff8da1" opacity="0.45"/>
    </svg>`;

  const holes = [];
  for (let i = 0; i < HOLES; i++) {
    const h = document.createElement('div');
    h.className = 'hole';
    h.dataset.idx = i;
    h.innerHTML = `
      <div class="mole-wrap">${chibiSvg}</div>
      <svg class="stars" viewBox="0 0 100 60" aria-hidden="true">
        <g fill="#ffd400" stroke="#b8001a" stroke-width="1.5" stroke-linejoin="round">
          <polygon points="15,30 18,22 21,30 29,28 23,34 26,42 18,38 10,42 13,34 7,28"/>
          <polygon points="50,8  53,0  56,8  64,6  58,12 61,20 53,16 45,20 48,12 42,6"/>
          <polygon points="85,30 88,22 91,30 99,28 93,34 96,42 88,38 80,42 83,34 77,28"/>
        </g>
      </svg>
      <div class="ko">K.O.!</div>
      <div class="gain">+1</div>
      <div class="combo-flash"></div>
    `;
    h.addEventListener('click', () => onHit(i));
    board.appendChild(h);
    holes.push(h);
  }

  // ===== 錘子游標 =====
  const hammer = $('hammer');
  let lastX = window.innerWidth / 2, lastY = window.innerHeight / 2;
  hammer.style.left = lastX + 'px';
  hammer.style.top  = lastY + 'px';
  document.addEventListener('mousemove', (e) => {
    hammer.style.left = e.clientX + 'px';
    hammer.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mousedown', () => {
    hammer.classList.add('swing');
    setTimeout(() => hammer.classList.remove('swing'), 220);
  });
  document.addEventListener('mouseleave', () => hammer.style.opacity = '0');
  document.addEventListener('mouseenter', () => hammer.style.opacity = '1');

  // ===== state =====
  let score = 0, combo = 0, best = +(localStorage.getItem('whack_best') || 0);
  let timeLeft = ROUND_MS / 1000;
  let active = new Map();
  let running = false;
  let spawnTimer = null, countdownTimer = null, endAt = 0;
  let soundOn = true;
  let musicOn = true;
  let bgmTimer = null, bgmIndex = 0;

  $('best').textContent = best;
  $('best-2').textContent = best;

  let audioCtx = null;
  function beep(freq, duration = 0.06, type = 'square', vol = 0.18) {
    if (!soundOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      o.stop(audioCtx.currentTime + duration);
    } catch (e) {}
  }

  // ===== 8-bit BGM =====
  // 32 音的可愛循環:C-F-G-C 大調進行(每 8 音換一個和弦)
  const BGM_MELODY = [
    // I (C) — C E G C G E C E
    523.25, 659.25, 783.99, 1046.50, 783.99, 659.25, 523.25, 659.25,
    // IV (F) — F A C F C A F A
    698.46, 880.00, 1046.50, 1396.91, 1046.50, 880.00, 698.46, 880.00,
    // V (G) — G B D G D B G B
    783.99, 987.77, 1174.66, 1567.98, 1174.66, 987.77, 783.99, 987.77,
    // I (C) 回主和弦
    523.25, 659.25, 783.99, 1046.50, 783.99, 659.25, 523.25, 659.25,
  ];
  // 每個小節開頭撥一個低音,讓和弦感更厚
  const BGM_BASS = [130.81, 174.61, 196.00, 130.81]; // C3 F3 G3 C3

  function bgmTone(freq, duration, type, vol) {
    if (!musicOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      o.stop(audioCtx.currentTime + duration);
    } catch (e) {}
  }

  function bgmStep() {
    if (!musicOn || !running) { bgmTimer = null; return; }
    // 旋律:三角波,音量比 SFX 低很多
    bgmTone(BGM_MELODY[bgmIndex], 0.18, 'triangle', 0.05);
    // 每 8 音(小節開頭)補一個低音
    if (bgmIndex % 8 === 0) {
      bgmTone(BGM_BASS[(bgmIndex / 8) | 0], 0.55, 'sawtooth', 0.035);
    }
    bgmIndex = (bgmIndex + 1) % BGM_MELODY.length;
    // 最後 10 秒加快節奏製造緊張感
    const tempo = timeLeft <= 10 ? 140 : 220;
    bgmTimer = setTimeout(bgmStep, tempo);
  }

  function startBgm() {
    stopBgm();
    bgmIndex = 0;
    bgmStep();
  }

  function stopBgm() {
    if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  }

  function spawn() {
    if (!running) return;
    if (active.size < MAX_CONCURRENT) {
      const free = holes.map((_, i) => i).filter(i => !active.has(i));
      if (free.length) {
        const idx = free[Math.floor(Math.random() * free.length)];
        const elapsed = (ROUND_MS - (endAt - performance.now())) / ROUND_MS;
        const life = Math.max(MIN_LIFETIME, MAX_LIFETIME - elapsed * 500);
        showMole(idx, life);
      }
    }
    const interval = MIN_INTERVAL + Math.random() * (MAX_INTERVAL - MIN_INTERVAL);
    spawnTimer = setTimeout(spawn, interval);
  }

  function showMole(idx, lifetimeMs) {
    const h = holes[idx];
    h.classList.remove('down', 'hit', 'combo');
    const faceImg = h.querySelector('.face-img');
    if (faceImg) faceImg.setAttribute('href', nextFace());
    h.classList.add('up');
    const hideAt = performance.now() + lifetimeMs;
    const t = setTimeout(() => hideMole(idx, false), lifetimeMs);
    active.set(idx, { hideAt, hidTimer: t });
  }

  function hideMole(idx, wasHit) {
    const h = holes[idx];
    const a = active.get(idx);
    if (a) clearTimeout(a.hidTimer);
    active.delete(idx);
    h.classList.remove('up');
    h.classList.add('down');
    setTimeout(() => {
      h.classList.remove('down', 'hit', 'combo');
      const gainEl = h.querySelector('.gain');
      if (gainEl) gainEl.textContent = '+1';
    }, 240);
  }

  function onHit(idx) {
    if (!running) return;
    if (!active.has(idx)) {
      combo = 0; $('combo').textContent = combo;
      beep(180, 0.05, 'sawtooth', 0.08);
      return;
    }
    const h = holes[idx];
    combo++;
    let gain = 1;
    if (combo >= 3) { gain = 2; h.classList.add('combo'); }
    score += gain;
    $('score').textContent = score;
    $('combo').textContent = combo;
    h.querySelector('.gain').textContent = '+' + gain;
    h.classList.add('hit');
    beep(880, 0.07, 'square', 0.2);
    if (gain > 1) setTimeout(() => beep(1320, 0.05, 'triangle', 0.18), 60);
    setTimeout(() => hideMole(idx, true), 420);
  }

  function start() {
    score = 0; combo = 0;
    faceBag = [];
    timeLeft = ROUND_MS / 1000;
    $('score').textContent = 0;
    $('combo').textContent = 0;
    $('time').textContent = timeLeft;
    $('start-screen').classList.add('hidden');
    $('end-screen').classList.add('hidden');
    running = true;
    endAt = performance.now() + ROUND_MS;
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    if (musicOn) startBgm();
    spawn();
    countdownTimer = setInterval(() => {
      const left = Math.max(0, Math.ceil((endAt - performance.now()) / 1000));
      timeLeft = left;
      $('time').textContent = left;
      if (left <= 0) { end(); }
      else if (left <= 5) { beep(660, 0.04, 'sine', 0.12); }
    }, 250);
  }

  function end() {
    running = false;
    stopBgm();
    if (spawnTimer) clearTimeout(spawnTimer);
    if (countdownTimer) clearInterval(countdownTimer);
    for (const idx of [...active.keys()]) hideMole(idx, false);
    beep(523, 0.12, 'sine', 0.18);
    setTimeout(() => beep(392, 0.18, 'sine', 0.16), 130);
    const newBest = score > best;
    if (newBest) {
      best = score;
      localStorage.setItem('whack_best', best);
    }
    $('best').textContent = best;
    $('best-2').textContent = best;
    $('end-best').textContent = best;
    $('final-score').textContent = score;
    $('new-best').style.display = newBest ? 'inline' : 'none';
    $('end-screen').classList.remove('hidden');
  }

  $('start').addEventListener('click', start);
  $('start-2').addEventListener('click', start);
  $('restart').addEventListener('click', start);
  $('sound').addEventListener('click', () => {
    soundOn = !soundOn;
    $('sound').textContent = soundOn ? '🔊 音效：開' : '🔇 音效：關';
  });
  $('music').addEventListener('click', () => {
    musicOn = !musicOn;
    $('music').textContent = musicOn ? '🎵 音樂：開' : '🎵 音樂：關';
    if (running) {
      if (musicOn) startBgm();
      else stopBgm();
    }
  });
})();
</script>
</body>
