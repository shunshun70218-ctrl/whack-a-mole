<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>掃碼進入 · 打地鼠</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
    color: white;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  h1 { font-size: clamp(2rem, 6vw, 4rem); margin: 0 0 0.5rem; letter-spacing: 4px; }
  .subtitle { font-size: clamp(0.9rem, 2vw, 1.2rem); color: #cbd5e1; margin-bottom: 2rem; }
  .qr-card {
    background: white;
    padding: 1.5rem;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .qr-card img {
    width: min(360px, 60vw);
    height: auto;
    display: block;
    image-rendering: pixelated;
  }
  .url {
    margin-top: 1.5rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: clamp(0.85rem, 1.6vw, 1.1rem);
    background: rgba(255,255,255,0.1);
    padding: 0.6rem 1rem;
    border-radius: 6px;
    word-break: break-all;
    max-width: 90vw;
  }
  .hint { margin-top: 1.5rem; color: #9ca3af; font-size: 0.9rem; }
</style>
</head>
<body>
  <h1>🎯 打 地 鼠 🔨</h1>
  <div class="subtitle">手機掃 QR Code 開始挑戰</div>
  <div class="qr-card">
    <img src="qr.png" alt="QR Code 連到打地鼠遊戲">
  </div>
  <div class="url">https://shunshun70218-ctrl.github.io/whack-a-mole/</div>
  <div class="hint">30 秒挑戰 · 連擊有獎勵 · 支援手機 / 平板 / 電腦</div>
</body>
</html>
